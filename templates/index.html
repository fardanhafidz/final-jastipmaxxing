{% extends "base.html" %}
{% block title %}Optimize{% endblock %}

{% block content %}
<div class="maps-layout">
    <!-- ===== Full-Screen Map ===== -->
    <div id="map"></div>

    <!-- ===== Floating Search Bar (top center) ===== -->
    <div class="float-search" id="floatSearch">
        <div class="search-box">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="poiSearch" class="search-input" placeholder="Search locations...">
        </div>
        <select id="poiCategory" class="filter-select">
            <option value="">All Categories</option>
            <option value="amenity">Amenity (Resto, Cafe)</option>
            <option value="building">Building (Kos, Gedung)</option>
        </select>
        <div id="poiResults" class="poi-results"></div>
    </div>

    <!-- ===== Floating Sidebar (left side) ===== -->
    <aside class="float-sidebar" id="sidebar">
        <div class="float-sidebar-header">
            <div class="sidebar-title-row">
                <h2 class="sidebar-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    Points
                </h2>
                <span class="badge-total" id="pointCount">0 TOTAL</span>
            </div>
            <button class="sidebar-collapse-btn" id="sidebarCollapse" title="Toggle sidebar">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
        </div>

        <!-- Mode Selector -->
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="basecamp" title="Basecamp">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                BC
            </button>
            <button class="mode-btn" data-mode="pickup" title="Pickup">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13" rx="2"/><polyline points="16 8 20 8 23 11 23 16 1 16"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
                Pickup
            </button>
            <button class="mode-btn" data-mode="delivery" title="Delivery">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                Delivery
            </button>
        </div>

        <!-- Points List -->
        <div class="float-points-list" id="pointsList">
            <!-- dynamically populated -->
        </div>
    </aside>

    <!-- ===== Floating Route Steps Panel (separate from sidebar) ===== -->
    <aside class="float-steps" id="stepsPanel" style="display:none;">
        <div class="steps-panel-header">
            <h3 class="steps-panel-title">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                Final Route
            </h3>
            <button class="btn-reset" id="btnReset" title="Reset route">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="stops-table" id="stopsTable"></div>
        <div class="steps-metrics" id="stepsMetrics">
            <div class="steps-metric">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <div>
                    <span class="metric-label">EST. TIME</span>
                    <span class="metric-value" id="metricTime">—</span>
                </div>
            </div>
            <div class="steps-metric-divider"></div>
            <div class="steps-metric">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                <div>
                    <span class="metric-label">DISTANCE</span>
                    <span class="metric-value" id="metricDist">—</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- ===== Floating Calculate Button (bottom center) ===== -->
    <div class="float-calculate" id="floatCalculate">
        <button class="btn-calculate" id="btnOptimize" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            Calculate Best Route
        </button>
    </div>

    <!-- ===== Sidebar Toggle (mobile) ===== -->
    <button class="sidebar-toggle" id="sidebarToggle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>

    <!-- ===== Loading Overlay ===== -->
    <div class="loading-overlay" id="loadingOverlay" style="display:none;">
        <div class="loading-spinner"></div>
        <span>
            <svg class="loading-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            Computing optimal route...
        </span>
    </div>
</div>
{% endblock %}
